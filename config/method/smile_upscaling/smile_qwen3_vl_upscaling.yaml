# =============================================================================
# FusionBench Method Configuration: SMILE Upscaling (Qwen3-VL)
# =============================================================================
# Specialized SMILE upscaling for Qwen3-VL models with rank settings.
# =============================================================================
_target_: fusion_bench.method.smile_upscaling.smile_qwen3_vl.SmileQwen3VLUpscalingAlgorithm
# device to put the models on
device: cpu
# device to perform SVD on
accelerator: cuda
# path to save/load the model
model_save_path: ${path.log_dir}/checkpoint
model_dtype: null
# SmileMoE parameters
num_experts_per_tok: 1
rank_of_router: 8
# if rank_of_expert < 0, dense expert is used.
rank_of_expert: 64
save_with_remote_code: true
upscale_vision: false
